<svg xmlns="http://www.w3.org/2000/svg" width="2500" height="843" viewBox="0 0 2500 843">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6fa845" />
      <stop offset="1" stop-color="#5b9135" />
    </linearGradient>
  </defs>
  <rect width="2500" height="843" fill="url(#bg)" />

  <!-- 枝モチーフ -->
  <g stroke="#ffffff" stroke-opacity="0.35" stroke-width="10" stroke-linecap="round" fill="none">
    <path d="M320 640 V300" />
    <path d="M320 420 L210 300" />
    <path d="M320 420 L430 300" />
    <path d="M320 340 L240 250" />
    <path d="M320 340 L400 250" />
  </g>
  <circle cx="320" cy="230" r="22" fill="#ffffff" fill-opacity="0.7" />

  <text x="1300" y="380" text-anchor="middle"
        font-family="'Hiragino Mincho ProN','Yu Mincho',serif"
        font-size="170" font-weight="700" fill="#ffffff">予約する</text>
  <text x="1300" y="540" text-anchor="middle"
        font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif"
        font-size="64" fill="#ffffff" fill-opacity="0.92">タップして予約をはじめる</text>

  <!-- タップ誘導 -->
  <rect x="1010" y="610" width="580" height="110" rx="55" fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-opacity="0.6" stroke-width="3" />
  <text x="1300" y="683" text-anchor="middle"
        font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif"
